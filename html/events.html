<!doctype html>
<html lang="en" class="scroll-smooth">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1.0" />
    <meta
      name="keywords"
      content="cybersecurity,firewall,it,digital,vbn,hotline,ahmed,magdi"
    />
    <meta name="description" content="CV, Cybersecurity, Certifications" />
    <meta name="author" content="Ahmed Magdi" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <title>Events - Eng. Ahmed Magdi</title>
  </head>

  <body
    class="bg-slate-50 text-slate-800 antialiased font-sans min-h-screen flex flex-col"
  >
    <!-- Navigation Bar -->
    <nav
      id="navigation"
      class="sticky top-0 bg-white/80 backdrop-blur-md shadow-xs z-50"
    >
      <div
        class="max-w-4xl mx-auto px-4 py-4 flex flex-col sm:flex-row justify-between items-center gap-4"
      >
        <h1
          class="text-xl font-bold bg-linear-to-r from-blue-600 to-indigo-600 bg-clip-text text-transparent"
        >
          Ahmed Magdi Abdel Maqsoud
        </h1>
        <ul class="flex items-center gap-6">
          <li>
            <a
              href="../index.html"
              title="home"
              class="p-2 inline-block hover:bg-slate-100 rounded-full transition-colors"
            >
              <img
                src="../icons/House.png"
                alt="Home"
                class="w-6 h-6 object-contain"
              />
            </a>
          </li>
          <li>
            <!-- Styled as active link -->
            <a
              href="events.html"
              title="events"
              class="p-2 inline-block bg-slate-100 rounded-full transition-colors"
            >
              <img
                src="../icons/events.webp"
                alt="Events"
                class="w-6 h-6 object-contain"
              />
            </a>
          </li>
          <li>
            <a
              href="cert.html"
              title="certifications"
              class="p-2 inline-block hover:bg-slate-100 rounded-full transition-colors"
            >
              <img
                src="../icons/user interface.png"
                alt="Certifications"
                class="w-6 h-6 object-contain"
              />
            </a>
          </li>
        </ul>
      </div>
      <hr class="border-slate-100" />
    </nav>

    <!-- Main Content Area -->
    <main class="max-w-4xl w-full mx-auto px-4 py-10 flex-1">
      <!-- Header Section / Button Replacement -->
      <div
        class="mb-10 flex items-center justify-between border-b border-slate-200 pb-4"
      >
        <h2 class="text-2xl font-bold text-slate-900 flex items-center gap-2">
          <span class="w-1.5 h-6 bg-blue-600 rounded-full"></span>
          Professional Events Gallery
        </h2>
        <span
          class="text-xs font-semibold uppercase tracking-wider text-blue-600 bg-blue-50 px-2.5 py-1 rounded-md"
        >
          Highlights
        </span>
      </div>

      <!-- Responsive Card Grid -->
      <section class="grid grid-cols-1 sm:grid-cols-2 gap-6">
        <!-- Event 1 -->
        <div
          class="bg-white rounded-2xl overflow-hidden shadow-xs border border-slate-100 group hover:shadow-md transition-all duration-300"
        >
          <div class="aspect-4/3 overflow-hidden bg-slate-100">
            <img
              src="../events/event1.jpg"
              alt="Event 1"
              class="w-full h-full object-cover group-hover:scale-102 transition-transform duration-300"
            />
          </div>
        </div>

        <!-- Event 2 -->
        <div
          class="bg-white rounded-2xl overflow-hidden shadow-xs border border-slate-100 group hover:shadow-md transition-all duration-300"
        >
          <div class="aspect-4/3 overflow-hidden bg-slate-100">
            <img
              src="../events/event2.jpg"
              alt="Event 2"
              class="w-full h-full object-cover group-hover:scale-102 transition-transform duration-300"
            />
          </div>
        </div>

        <!-- Event 3 -->
        <div
          class="bg-white rounded-2xl overflow-hidden shadow-xs border border-slate-100 group hover:shadow-md transition-all duration-300"
        >
          <div class="aspect-4/3 overflow-hidden bg-slate-100">
            <img
              src="../events/event3.jpg"
              alt="Event 3"
              class="w-full h-full object-cover group-hover:scale-102 transition-transform duration-300"
            />
          </div>
        </div>

        <!-- Event 4 (Integrated into the main grid layout gracefully) -->
        <div
          id="custom"
          class="bg-white rounded-2xl overflow-hidden shadow-xs border border-slate-100 group hover:shadow-md transition-all duration-300"
        >
          <div class="aspect-4/3 overflow-hidden bg-slate-100">
            <img
              src="../events/event4.jpg"
              alt="Event 4"
              class="w-full h-full object-cover group-hover:scale-102 transition-transform duration-300"
            />
          </div>
        </div>
      </section>
    </main>
  </body>
</html>
